<!DOCTYPE html>
<html lang="lv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pieslēgties – Tirdzniecības Atļauju Sistēma</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="mark">V</div>
            <h1>Tirdzniecības Atļaujas</h1>
            <p>Ventspils valstspilsētas pašvaldība</p>
        </div>
 
        <div th:if="${error}" class="alert alert-error">UZMANĪBU <span th:text="${error}"></span></div>
        <div th:if="${message}" class="alert alert-success"> <span th:text="${message}"></span></div>
        <div th:if="${success}" class="alert alert-success"> <span th:text="${success}"></span></div>
 
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label">Lietotājvārds</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Ievadiet lietotājvārdu" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Parole</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Ievadiet paroli" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding:12px;">
                Pieslēgties
            </button>
        </form>
 
        <div class="auth-footer">
            Nav konta? <a th:href="@{/register}">Reģistrēties šeit</a>
        </div>
    </div>
</div>
</body>
</html>
